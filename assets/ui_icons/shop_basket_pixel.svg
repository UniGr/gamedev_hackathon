<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <!-- handle left -->
  <rect x="16" y="8" width="4" height="12" fill="#A06A00"/>
  <rect x="16" y="12" width="8" height="4" fill="#A06A00"/>
  
  <!-- handle right -->
  <rect x="44" y="8" width="4" height="12" fill="#A06A00"/>
  <rect x="40" y="12" width="8" height="4" fill="#A06A00"/>
  
  <!-- basket rim (dark) -->
  <rect x="12" y="20" width="40" height="4" fill="#8A5A00"/>
  
  <!-- basket sides outer -->
  <rect x="8" y="24" width="4" height="20" fill="#A06A00"/>
  <rect x="52" y="24" width="4" height="20" fill="#A06A00"/>
  
  <!-- basket body (medium gold) -->
  <rect x="12" y="24" width="40" height="20" fill="#D89A00"/>
  
  <!-- basket body inner (light gold) -->
  <rect x="16" y="28" width="32" height="12" fill="#F3C200"/>
  
  <!-- basket base highlight -->
  <rect x="20" y="32" width="24" height="4" fill="#FFD84A"/>
  
  <!-- basket bottom rim -->
  <rect x="12" y="44" width="40" height="4" fill="#8A5A00"/>
  
  <!-- vertical weave lines -->
  <rect x="24" y="24" width="2" height="20" fill="#FFD84A"/>
  <rect x="38" y="24" width="2" height="20" fill="#FFD84A"/>
  
  <!-- horizontal weave line -->
  <rect x="16" y="36" width="32" height="2" fill="#FFE98A"/>
</svg>
